<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>APEX Clinical AI Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['Inter', 'ui-sans-serif', 'system-ui'],
        mono: ['IBM Plex Mono', 'ui-monospace', 'monospace'],
      },
    },
  },
};
</script>
<style>
  :root {
    /* Clinical light theme */
    --bg: #eef1f5;
    --surface: #ffffff;
    --surface-2: #f6f8fb;
    --surface-3: #eaeef3;
    --line: #d6dde7;
    --line-strong: #b9c3d2;
    --text: #0a1322;              /* primary — darker for AA */
    --text-2: #2f3b53;            /* secondary — was #3b4860 */
    --muted: #4f5b75;             /* muted — darker, was #6b7790 (AA fail) */
    --dim: #7a849a;

    /* Module accents */
    --accent: #3955d8;
    --accent-2: #2a3fa8;
    --accent-soft: #e7ebfb;
    --accent-text: #2a3fa8;

    /* Semantic */
    --danger: #b81f25;
    --danger-soft: #fde8e9;
    --warn: #92480a;
    --warn-soft: #fdf1de;
    --ok: #066c44;
    --ok-soft: #def4e8;
    --info: #154f8a;
    --info-soft: #e0eaf6;

    /* Focus ring */
    --focus-ring: 0 0 0 3px rgba(57, 85, 216, 0.30);
  }
  html, body { background: var(--bg); color: var(--text); }
  body {
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
    font-feature-settings: "ss01", "cv11", "tnum";
    font-variant-numeric: tabular-nums;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-size: 14px;
  }

  /* Global focus ring (keyboard nav) */
  *:focus { outline: none; }
  *:focus-visible {
    outline: none;
    box-shadow: var(--focus-ring);
    border-radius: 6px;
    transition: box-shadow 80ms;
  }
  button, a, [role="button"] { -webkit-tap-highlight-color: transparent; }

  /* Tooltip */
  .has-tip { position: relative; }
  .has-tip > .tip {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: #0a1322;
    color: #fff;
    font-size: 11.5px;
    line-height: 1.4;
    padding: 6px 10px;
    border-radius: 6px;
    white-space: normal;
    max-width: 240px;
    width: max-content;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 150ms ease 250ms;
    box-shadow: 0 8px 24px rgba(15, 26, 43, 0.18);
  }
  .has-tip > .tip::after {
    content: "";
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: #0a1322;
  }
  .has-tip:hover > .tip,
  .has-tip:focus-visible > .tip,
  .has-tip:focus-within > .tip { opacity: 1; }

  /* Toast */
  .toast-stack {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 70;
    pointer-events: none;
  }
  .toast {
    pointer-events: auto;
    min-width: 280px;
    max-width: 360px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 10px 12px;
    box-shadow: 0 8px 24px rgba(15, 26, 43, 0.12);
    animation: toastIn 250ms ease-out;
  }
  .toast[data-tone="danger"] { border-left-color: var(--danger); }
  .toast[data-tone="ok"] { border-left-color: var(--ok); }
  .toast[data-tone="warn"] { border-left-color: var(--warn); }
  @keyframes toastIn {
    from { transform: translateY(8px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* Surfaces */
  .surface { background: var(--surface); border: 1px solid var(--line); }
  .surface-2 { background: var(--surface-2); border: 1px solid var(--line); }
  .surface-3 { background: var(--surface-3); border: 1px solid var(--line); }
  .hairline { border-color: var(--line); }
  .hairline-strong { border-color: var(--line-strong); }

  /* Type tokens */
  .t-primary { color: var(--text); }
  .t-secondary { color: var(--text-2); }
  .t-muted { color: var(--muted); }
  .t-dim { color: var(--dim); }

  /* Accent helpers (per module) */
  .accent-text { color: var(--accent-text); }
  .accent-bg { background: var(--accent); }
  .accent-soft-bg { background: var(--accent-soft); }
  .accent-border { border-color: var(--accent); }

  /* Card shadow — subtle, clinical */
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
  }
  .card-elev {
    box-shadow: 0 1px 2px rgba(15, 26, 43, 0.04);
  }

  /* labels */
  .label-eyebrow {
    font-size: 11px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    white-space: nowrap;
  }

  /* Inputs */
  .input {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 150ms, box-shadow 150ms;
  }
  .input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  /* Sleek scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* Range slider */
  input[type=range].clinical {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; background: var(--line-strong); border-radius: 999px; outline: none;
  }
  input[type=range].clinical::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; background: var(--surface); border-radius: 999px;
    border: 2px solid var(--accent);
    cursor: pointer;
    box-shadow: 0 1px 3px rgba(15, 26, 43, 0.12);
  }
  input[type=range].clinical::-moz-range-thumb {
    width: 16px; height: 16px; background: var(--surface); border-radius: 999px;
    border: 2px solid var(--accent);
    cursor: pointer;
  }

  /* Switch */
  .switch { width: 36px; height: 20px; background: #cbd5e1; border-radius: 999px; position: relative; transition: 200ms; cursor: pointer; }
  .switch::after { content: ""; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: white; border-radius: 999px; transition: 200ms; box-shadow: 0 1px 2px rgba(15,26,43,0.18); }
  .switch.on { background: var(--accent); }
  .switch.on::after { left: 18px; }

  /* Sidebar item active indicator */
  .nav-item[data-active="true"] {
    background: var(--accent-soft);
    color: var(--accent-text);
  }
  .nav-item[data-active="true"] .nav-icon {
    color: var(--accent-text);
    background: var(--surface);
    border-color: var(--accent);
  }

  /* Animations — keep subtle */
  @keyframes pulseSoft {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }
  .pulse-soft { animation: pulseSoft 1.8s ease-in-out infinite; }

  @keyframes scanY {
    0% { transform: translateY(-100%); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(120%); opacity: 0; }
  }
  .scan-line { animation: scanY 2.4s linear infinite; }

  @keyframes typeCaret {
    0%, 50% { opacity: 1; }
    50.01%, 100% { opacity: 0; }
  }
  .caret { animation: typeCaret 1s steps(2) infinite; }

  @keyframes flashWarn {
    0%, 100% { background-color: var(--danger-soft); border-color: rgba(193, 39, 45, 0.40); }
    50% { background-color: #fbdcdf; border-color: rgba(193, 39, 45, 0.80); }
  }
  .flash-warn { animation: flashWarn 1.2s ease-in-out infinite; }

  @keyframes fadeUp { 0% { transform: translateY(6px); } 100% { transform: translateY(0); } }
  .fade-up { animation: fadeUp 280ms ease-out; }

  /* Accent transition — only color, not background-color of whole panels */
  .accent-transition { transition: color 300ms ease, background-color 300ms ease, border-color 300ms ease; }

  /* CT/US/Path viewer base — keep dark inside, like real PACS */
  .viewer-dark {
    background: #0a1018;
    color: #d8dfea;
  }

  /* Subtle grid (for clinical viewers only) */
  .viewer-grid {
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 24px 24px;
  }
</style>
