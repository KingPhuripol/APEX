worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # ── Security defaults ────────────────────────────────────────────────────────
  server_tokens off;
  add_header X-Content-Type-Options  "nosniff"               always;
  add_header X-Frame-Options         "SAMEORIGIN"            always;
  add_header X-XSS-Protection        "1; mode=block"         always;
  add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

  # ── Gzip ────────────────────────────────────────────────────────────────────
  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml image/svg+xml;
  gzip_min_length 1024;
  gzip_proxied    any;

  # ── Docker internal DNS resolver (required for dynamic upstream resolution) ──
  resolver 127.0.0.11 valid=10s ipv6=off;

  # ── Upstream addresses (variables = resolved at request time, not startup) ──
  # This prevents nginx from failing when upstream containers aren't yet ready.
  map $host $frontend_upstream { default "http://frontend:3003"; }
  map $host $backend_upstream  { default "http://backend:3005";  }

  # ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS ────────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Strong TLS settings
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Allow large image uploads (base64 ~50 MB)
    client_max_body_size 70m;

    # ── Backend API ─────────────────────────────────────────────────────────────
    location /api/ {
      set $backend $backend_upstream;
      proxy_pass         $backend/api/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Cookie            $http_cookie;
      proxy_read_timeout 120s;
    }

    # ── SSE stream — disable buffering ──────────────────────────────────────────
    location /api/analyze/stream {
      set $backend $backend_upstream;
      proxy_pass         $backend/api/analyze/stream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Cookie            $http_cookie;
      proxy_buffering    off;
      proxy_cache        off;
      proxy_read_timeout 300s;
      proxy_set_header   Connection        "";
    }

    # ── Frontend (Next.js) ──────────────────────────────────────────────────────
    location / {
      set $frontend $frontend_upstream;
      proxy_pass         $frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Cookie            $http_cookie;
      proxy_read_timeout 60s;
    }
  }
}
