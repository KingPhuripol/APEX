version: "3.8"

services:
  # ---------------------------------------------------------
  # AXIA - Brain CT (nnU-Net)
  # ---------------------------------------------------------
  axia-backend:
    build:
      context: ./services/axia
      dockerfile: Dockerfile
    container_name: apex-axia-backend
    ports:
      - "5001:5000"
    restart: unless-stopped
    networks:
      - apex-net

  # ---------------------------------------------------------
  # Secure Authentication Provider
  # ---------------------------------------------------------
  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: apex-auth-service
    ports:
      - "3001:3001"
    restart: unless-stopped
    networks:
      - apex-net

  # ---------------------------------------------------------
  # SmartLiva - Liver Ultrasound (C3Net + Conformal + GPT-4o)
  # ---------------------------------------------------------
  smartliva-backend:
    build:
      context: ./services/smartliva
      dockerfile: Dockerfile
    container_name: apex-smartliva-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:////app/db/smartliva.db
      - FRONTEND_URL=http://localhost:9090
    volumes:
      - ./services/smartliva/app:/app/app
      - smartliva_db:/app/db
    restart: unless-stopped
    networks:
      - apex-net

  # ---------------------------------------------------------
  # PICHA - Cholangiocarcinoma Pathology (MARS 7-Agent)
  # ---------------------------------------------------------
  picha-backend:
    build:
      context: ./services/picha/backend
      dockerfile: Dockerfile
    container_name: apex-picha-backend
    ports:
      - "8005:3005"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-picha}:${POSTGRES_PASSWORD}@picha-db:5432/${POSTGRES_DB:-pichadb}
      - AI_SERVICE_URL=http://picha-ai-service:8200
      - ML_API_URL=http://picha-ml-service:8100
      - BACKEND_PORT=3005
      - DEMO_MODE=false
      - COOKIE_SECURE=false
    depends_on:
      picha-db:
        condition: service_healthy
      picha-ai-service:
        condition: service_healthy
      picha-ml-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - apex-net

  picha-ai-service:
    build:
      context: ./services/picha/ai-service
      dockerfile: Dockerfile
    container_name: apex-picha-ai-service
    ports:
      - "8200:8200"
    env_file:
      - .env
    environment:
      - ML_API_URL=http://picha-ml-service:8100
      - DEMO_MODE=false
    depends_on:
      picha-ml-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - apex-net

  picha-ml-service:
    build:
      context: ./services/picha/ml-service
      dockerfile: Dockerfile
    container_name: apex-picha-ml-service
    ports:
      - "8100:8100"
    env_file:
      - .env
    environment:
      - MODEL_PATH=model/convnext_base_best.pth
    volumes:
      - ./services/picha/ml-service/model:/app/model:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - apex-net

  picha-db:
    image: postgres:16-alpine
    container_name: apex-picha-db
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-picha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-pichadb}
    volumes:
      - picha_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U picha -d pichadb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - apex-net

  # ---------------------------------------------------------
  # API Gateway (Nginx)
  # ---------------------------------------------------------
  api-gateway:
    image: nginx:1.27-alpine
    container_name: apex-api-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./services/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - axia-backend
      - smartliva-backend
      - picha-backend
      - auth-service
    restart: unless-stopped
    networks:
      - apex-net

volumes:
  smartliva_db:
  picha_pgdata:

networks:
  apex-net:
    driver: bridge
